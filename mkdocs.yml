      - Dynamic modules: fundamentals/dynamic-modules.md
      - Injection scopes: fundamentals/injection-scopes.md
      - Circular dependency: fundamentals/circular-dependency.md
      - Module reference: fundamentals/module-ref.md
      - Lifecycle events: fundamentals/lifecycle-events.md
      - Platform agnosticism: fundamentals/platform-agnosticism.md
