site_name: Nika Framework
site_url: https://nika-framework.github.io/nika/
site_description: Nika is a modern backend framework for Go, designed for scalability, clean architecture, and developer productivity.
site_author: Sajad Mohammadi Nejad
repo_url: https://github.com/nika-framework/nika
repo_name: nika-framework/nika
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  logo: assets/logo.svg
  favicon: assets/favicon.png

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nika-framework/nika
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: 1
          intent: positive
        - icon: material/thumb-down-outline
          name: This page could be improved
          data: 0
          intent: needs improvement

plugins:
  - search:
      lang: en
  - git-revision-date-localized:
      enable_creation_date: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.snippets:
      auto_append:
        - includes/codehilite.css
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji
  - admonition
  - attr_list
  - md_in_html

